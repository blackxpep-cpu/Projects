<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Prompt Optimizer</title>
</head>
<body>
    <div class="container">
        <header>
            <nav class="nivel">
                <li class="active">Iniciante</li>
                <li>Intermediário</li>
                <li>Avançado</li>
            </nav>
            <nav class="categoria">
                <li class="active">Programação</li>
                <li>Estudos</li>
                <li>Conteúdo</li>
                <li>Outros</li>
            </nav>
        </header>
        <main>
            <h1>Digite qual prompt você deseja melhorar</h1>
            <p>Escreva o que você precisa e nós vamos te devolver um prompt otimizado, que vai melhorar seu resultado com IA.</p>

            <form action="">
                <label for="prompt"></label>
                <textarea id="prompt" maxlength="1000" cols="100" rows="5"></textarea>
                <button class="botao-otimizar" type="submit">Otimizar</button>
            </form>
        </main>
    </div>
</body>
<script src="/frontend/script.js"></script>
</html>

<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style.css">
    <title>Cadastro Freelancer</title>
</head>

<body>
    <div class="tela-centralizada">
        <header>
            <h1 class="registro">Registrar-se como <br> Freelancer</h1>
        </header>

        <main class="form-freela">
            <form action="" method="post">
                <div class="campo">
                    <label for="nome-completo" class="visually-hidden">nome-completo</label>
                    <input type="text" id="nome-completo" placeholder="Nome completo" required>
                </div>

                <div class="campo">
                    <label for="cpf" class="visually-hidden">cpf</label>
                    <input type="number" id="cpf" placeholder="CPF" required>
                </div>

                <div class="campo">
                    <label for="e-mail" class="visually-hidden">e-mail</label>
                    <input type="email" id="e-mail" placeholder="E-mail" required>
                </div>

                <div class="campo">
                    <label for="senha" class="visually-hidden">senha</label>
                    <input type="password" id="senha" placeholder="Senha" required>
                </div>

                <div class="campo">
                    <label for="repita-senha" class="visually-hidden">repita-senha</label>
                    <input type="password" id="repita-senha" placeholder="Repita a senha" required>
                </div>

                <button class="botao-cheio final-cadastro">FINALIZAR CADASTRO</button>
            </form>
        </main>
    </div>
</body>

</html>

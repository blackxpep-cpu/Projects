<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Resetar senha</title>
</head>

<body>
    <div class="reset">
        <header class="reset-senha">
            <div class="logotipo-reset">
                <img src="/assets/logotipo.png" alt="">
            </div>
        </header>
        <main class="form-reset">
            <form action="" method="post" class="reset-senha">
                <label for="e-mail">E-mail: </label>
                <input type="email" class="input-reset" placeholder="Digite seu e-mail..." required>
                <div class="botoes-senha">
                    <button class="botao-cheio button-cancelar">Cancelar</button>
                    <button class="botao-cheio button-resetar">Resetar senha</button>
                </div>
            </form>
        </main>
    </div>
</body>

</html>

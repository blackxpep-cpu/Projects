<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <title>Vagas Publicadas</title>
</head>

<body>
    <header class="minhas-candida opcoes">
        <div class="voltar">
            <img class="img-opcoes" src="{{ url_for('static', filename='assets/seta-esq-icon.png') }}" alt="voltar">
            <a class="seta-opcoes" href="">Voltar</a>
        </div>
        <h1>ÁREA DO CONTRATANTE</h1>
    </header>

    <main>
        <div class="opcoes-publi">
            <div class="opc publicadas">
                <p>Vagas publicadas</p>
            </div>
            <div class="opc candidatos">
                <p>Candidatos</p>
            </div>
        </div>

        <div class="containerp">
            <p class="qtd-candi">{{ vagas_na_tela|length }} vagas publicadas!</p>
            {% for vaga in vagas_na_tela %}

            <div class="publicacoes">
                <div class="cabecalho">
                    <h3 class="titulo"> {{vaga.titulo}} </h3>
                    <a href="{{ url_for('edit_vaga', id=vaga.id)}}"><img class="editar-publi" src="{{ url_for('static', filename='assets/edit-publi.png') }}" alt="editar-dados"></a>
                </div>
                <p class="valor-publi"> {{ vaga.remuneracao }} dia</p>
                <p class="descricao-publi"> {{ vaga.descricao}} </p>
            </div>
            {% else %}
                <p> Você ainda não possui vagas publicadas!</p>
            {% endfor %}
        </div>

    <footer>
            <nav class="icons">
                <a href="{{ url_for('mostrar_vaga_tela')}}"><button aria-label="Inicio"><img src="{{ url_for('static', filename='assets/casa-icon.png') }}" alt="home"></button></a>
                <a href="#"><button aria-label="Mais Opções"><img src="{{ url_for('static', filename='assets/opcoes-icon.png') }}" alt="opcoes"></button></a>
                <a href="{{ url_for('botao_perfil')}}"><button aria-label="Perfil"><img src="{{ url_for('static', filename='assets/perfil-icon.png') }}" alt="perfil"></button></a>
            </nav>
        </footer>
</body>

</html>

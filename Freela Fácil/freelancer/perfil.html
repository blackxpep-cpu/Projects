<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/style.css">
    <title>Perfil Freelancer</title>
</head>

<body>
    <main>
        <div class="perfil">
            <img src="/assets/foto-perfil.png" alt="foto-perfil">

            <label class="botao-foto" for="foto">Alterar foto</label>
            <input type="file" id="foto" accept="image/*" hidden>

            <h2>Nome do freelancer</h2>
            <div class="dados">
                <p>email@gmail.com</p>
                <p>nome de usuário</p>
            </div>
        </div>
        <div class="dados-pessoais">
            <div class="cabecalho-dados">
                <h3>Dados Pessoais</h3>
                <img src="/assets/edit-icon.png" alt="editar-dados">
            </div>
            <nav>
                <li>Nome completo:</li>
                <li>E-mail:</li>
                <li>Contato:</li>
                <li>CPF:</li>
            </nav>
        </div>
        <div class="colunas">
            <div class="desc-perfil">
                <h3>Seu currículo</h3>
                <p>Insira o seu currículo aqui.</p>
                <form action="" method="post">
                    <input class="input-curri" type="file" name="arquivo" id="" accept=".pdf">
                    <button class="perfil-free" type="submit">ENVIAR</button>
                </form>
            </div>
            <div class="candidaturas">
                <h3>Minhas candidaturas:</h3>
                <p>Você realizou X candidaturas!</p>
                <button class="perfil-free">CANDIDATURAS</button>
            </div>
        </div>
    </main>
    
    <footer>
        <nav class="icons">
            <button aria-label="Inicio"><img src="/assets/casa-icon.png" alt="home"></button>
            <button aria-label="Mais Opções"><img src="/assets/opcoes-icon.png" alt="home"></button>
            <button aria-label="Perfil"><img src="/assets/perfil-icon.png" alt="home"></button>
        </nav>
    </footer>
</body>

</html>

<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Freela Facil</title>
</head>

<body>
    <div class="tela-centralizada">
        <header class="logotipo-login">
            <img src="/assets/logotipo.png" alt="logotipo">
        </header>

        <main>
            <form action="" method="post">
                <div class="campo">
                    <img src="/assets/user-icon.png" alt="">
                    <label for="email-usuario" class="visually-hidden">Email ou usuário</label>
                    <input type="text" id="usuario" name="email-usuario" placeholder="E-mail ou usuário" required>
                </div>

                <div class="campo">
                    <img src="/assets/padlock-icon.png" alt="">
                    <label for="senha" class="visually-hidden">Senha</label>
                    <input type="password" id="senha" placeholder="Senha" required>
                    <img src="/assets/eye-icon.png" alt="olho-icone">
                </div>
                <a href="#" class="esquecer-senha">Esqueceu sua senha?</a>
                <button type="submit" class="botao-cheio button-login">ENTRAR</button>
                <p class="criar-conta">Não possui conta?<a href="#">Cadastre-se!</a></p>
            </form>
        </main>
    </div>
</body>

</html>
